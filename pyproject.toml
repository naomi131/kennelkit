[build-system]
requires = ["setuptools>=68", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "kennelkit"
version = "0.0.1"
description = "A modular framework for building Discord bots with auto-generated dashboards."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "naomi131" },
]
keywords = ["discord", "bot", "framework", "dashboard"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Communications :: Chat",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
]
dependencies = [
    "discord.py>=2.4.0",
    "sqlalchemy[asyncio]>=2.0.0",
    "alembic>=1.13.0",
    "asyncpg>=0.29.0",
    "quart>=0.19.0",
    "quart-discord>=0.5.0",
    "discord-ext-ipcx>=0.4.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7",
    "pytest-asyncio>=0.21",
    "ruff>=0.4",
]

[project.urls]
Homepage = "https://github.com/naomi131/kennelkit"
Repository = "https://github.com/naomi131/kennelkit"
Issues = "https://github.com/naomi131/kennelkit/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
kennelkit = ["dashboard/templates/*.html", "dashboard/static/img/*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]